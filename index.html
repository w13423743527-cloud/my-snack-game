<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>经典贪吃蛇小游戏</title>
    <style>
        /* ================= 页面和元素的样式 ================= */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            touch-action: none; 
            overflow: hidden;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        /* 模式选择区域 */
        #modeContainer {
            margin-bottom: 15px;
            font-size: 16px;
            background-color: #34495e;
            padding: 10px 20px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
        }

        #modeContainer label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 计分板容器 */
        #scoreContainer {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            text-align: center;
        }

        .score-box {
            font-size: 16px;
            font-weight: bold;
            padding: 10px 15px;
            background-color: #34495e;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            min-width: 100px;
        }

        /* 强调关卡提示 */
        #levelText {
            color: #f1c40f;
        }

        /* 按钮样式与不可用状态 */
        #startBtn {
            padding: 10px 40px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #27ae60;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.3s, transform 0.1s;
            min-height: 44px; 
        }

        #startBtn:hover:not(:disabled) {
            background-color: #2ecc71;
            transform: translateY(-2px);
        }

        /* 游戏进行中，按钮变灰 */
        #startBtn:disabled {
            background-color: #7f8c8d;
            cursor: not-allowed;
            box-shadow: none;
            color: #bdc3c7;
        }

        canvas {
            background-color: #ecf0f1; 
            border: 4px solid #bdc3c7;
            border-radius: 5px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
            max-width: 95vw; 
            max-height: 95vw;
        }

        .instructions {
            margin-top: 15px;
            font-size: 14px;
            color: #bdc3c7;
            text-align: center;
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <h1>贪吃蛇</h1>
    
    <div id="modeContainer">
        <label><input type="radio" name="gameMode" value="basic" checked> 基础模式</label>
        <label><input type="radio" name="gameMode" value="challenge"> 挑战模式</label>
    </div>

    <div id="scoreContainer">
        <div id="scoreBoard" class="score-box">分数: 0<br><span id="levelText"></span></div>
        <div id="highScoreBoard" class="score-box">最高分: 0</div>
    </div>
    
    <button id="startBtn">开始游戏</button>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="instructions">电脑: ⬆️ ⬇️ ⬅️ ➡️ 控制 | 手机: 直接滑动屏幕</div>
