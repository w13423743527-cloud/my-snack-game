<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典贪吃蛇小游戏</title>
    <style>
        /* ================= 页面和元素的样式 ================= */
        body {
            display: flex;
            flex-direction: column;
            align-items: center; /* 居中对齐 */
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50; /* 深色背景，保护眼睛 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        /* 计分板容器，让当前分数和最高分并排显示 */
        #scoreContainer {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        /* 计分板通用样式 */
        .score-box {
            font-size: 20px;
            font-weight: bold;
            padding: 10px 20px;
            background-color: #34495e;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* 开始/重新开始按钮样式 */
        #startBtn {
            padding: 10px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #27ae60;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.3s;
        }

        #startBtn:hover {
            background-color: #2ecc71;
        }

        /* 游戏画布区域样式 */
        canvas {
            background-color: #ecf0f1; /* 画布背景色为浅灰白 */
            border: 4px solid #bdc3c7;
            border-radius: 5px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
        }

        /* 操作提示说明 */
        .instructions {
            margin-top: 15px;
            font-size: 14px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <h1>贪吃蛇</h1>
    
    <!-- 计分板和最高分 -->
    <div id="scoreContainer">
        <div id="scoreBoard" class="score-box">分数: 0</div>
        <div id="highScoreBoard" class="score-box">最高分: 0</div>
    </div>
    
    <!-- 开始按钮 -->
    <button id="startBtn">开始游戏</button>

    <!-- 游戏主画布，宽400像素，高400像素 -->
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="instructions">使用键盘 ⬆️ ⬇️ ⬅️ ➡️ 方向键控制移动</div>

    <script>
        /* ================= 游戏核心逻辑 (JavaScript) ================= */

        // 获取画布和绘图上下文
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // 游戏基本设定
        const gridSize = 20; 
        let score = 0;       
        let gameSpeed = 100; 
        let gameLoop;        
        let isGameRunning = false; // 新增：控制游戏是否在运行的状态标志

        // 新增：从本地存储获取历史最高分，如果没有则为0
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        document.getElementById('highScoreBoard').innerHTML = "最高分: " + highScore;

        // 蛇的初始状态
        let snake = [
            { x: 200, y: 200 },
            { x: 180, y: 200 },
            { x: 160, y: 200 }
        ];

        let dx = gridSize; 
        let dy = 0;
        let changingDirection = false; 
        let foodX;
        let foodY;

        // 监听键盘按键
        document.addEventListener("keydown", changeDirection); 
        // 监听开始按钮点击
        document.getElementById('startBtn').addEventListener('click', startGame);

        // 初始化/重置并开始游戏
        function startGame() {
            if (isGameRunning) return; // 如果游戏正在运行，防误触
            isGameRunning = true;

            // 隐藏开始按钮
            document.getElementById('startBtn').style.display = 'none';

            // 重置所有状态
            score = 0;
            document.getElementById('scoreBoard').innerHTML = "分数: " + score;
            dx = gridSize;
            dy = 0;
            snake = [
                { x: 200, y: 200 },
                { x: 180, y: 200 },
                { x: 160, y: 200 }
            ];
            
            createFood();
            
            // 开始循环
            gameLoop = setInterval(main, gameSpeed); 
        }

        // 游戏主循环
        function main() {
            if (hasGameEnded()) {
                clearInterval(gameLoop); // 停止游戏循环
                isGameRunning = false;   // 更新状态为已停止

                // 更新历史最高分
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore); // 存入浏览器
                    document.getElementById('highScoreBoard').innerHTML = "最高分: " + highScore;
                }

                alert("游戏结束！你的最终得分是：" + score);

                // 游戏结束后，重新显示按钮，并改名为“重新开始”
                const startBtn = document.getElementById('startBtn');
                startBtn.style.display = 'block';
                startBtn.innerText = '重新开始';
                return;
            }

            changingDirection = false; 
            clearCanvas();             
            drawFood();                
            moveSnake();               
            drawSnake();               
        }

        // 清空画布
        function clearCanvas() {
            ctx.fillStyle = "#ecf0f1"; 
            ctx.strokeStyle = "#bdc3c7";
            ctx.fillRect(0, 0, canvas.width, canvas.height); 
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
        }

        // 绘制蛇
        function drawSnake() {
            snake.forEach(drawSnakePart);
        }

        // 绘制蛇的单个身体方块
        function drawSnakePart(snakePart, index) {
            ctx.fillStyle = index === 0 ? "#27ae60" : "#2ecc71"; 
            ctx.strokeStyle = "#27ae60"; 
            ctx.fillRect(snakePart.x, snakePart.y, gridSize, gridSize);
            ctx.strokeRect(snakePart.x, snakePart.y, gridSize, gridSize);
        }

        // 移动蛇的位置
        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);
            const hasEatenFood = snake[0].x === foodX && snake[0].y === foodY;

            if (hasEatenFood) {
                score += 10;
                document.getElementById('scoreBoard').innerHTML = "分数: " + score;
                createFood();
            } else {
                snake.pop();
            }
        }

        // 改变方向
        function changeDirection(event) {
            if (!isGameRunning) return; // 游戏没开始时，按键无效
            if (changingDirection) return;

            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;

            const keyPressed = event.keyCode;
            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if (keyPressed === LEFT_KEY && !goingRight) {
                dx = -gridSize;
                dy = 0;
                changingDirection = true;
            }
            if (keyPressed === UP_KEY && !goingDown) {
                dx = 0;
                dy = -gridSize;
                changingDirection = true;
            }
            if (keyPressed === RIGHT_KEY && !goingLeft) {
                dx = gridSize;
                dy = 0;
                changingDirection = true;
            }
            if (keyPressed === DOWN_KEY && !goingUp) {
                dx = 0;
                dy = gridSize;
                changingDirection = true;
            }
        }

        // 判断游戏是否结束
        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= canvas.width;
            const hitToptWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= canvas.height;

            return hitLeftWall || hitRightWall || hitToptWall || hitBottomWall;
        }

        function randomTen(min, max) {
            return Math.round((Math.random() * (max - min) + min) / gridSize) * gridSize;
        }

        function createFood() {
            foodX = randomTen(0, canvas.width - gridSize);
            foodY = randomTen(0, canvas.height - gridSize);
            snake.forEach(function isFoodOnSnake(part) {
                const foodIsOnSnake = part.x == foodX && part.y == foodY;
                if (foodIsOnSnake) createFood(); 
            });
        }

        function drawFood() {
            ctx.fillStyle = "#e74c3c"; 
            ctx.strokeStyle = "#c0392b";
            ctx.fillRect(foodX, foodY, gridSize, gridSize);
            ctx.strokeRect(foodX, foodY, gridSize, gridSize);
        }

        // 初始化页面时，只画出静态的背景和蛇，等待用户点击开始
        clearCanvas();
        drawSnake();

    </script>
</body>
</html>
